server:
  port: 3000

spring:
  application:
    name: aitrainer-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ai_trainer?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: "base64EncodedSecretKeyForAiTrainerApplicationThatMustBeLongEnough"
  expiration: 604800000 # 7 days
