server:
  port: 3000

spring:
  profiles:
    active: dev
  application:
    name: aitrainer-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:ai_trainer}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    # username 和 password 已移至 application-dev.yml

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password 已移至 application-dev.yml
      database: 0

  # 邮件服务配置 (以 QQ 邮箱为例)
  mail:
    host: smtp.qq.com
    port: 587
    # username 和 password 已移至 application-dev.yml
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

jwt:
  # secret 已移至 application-dev.yml
  expiration: 604800000 # 7 days

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    avatar-url-expire-seconds: ${ALIYUN_OSS_AVATAR_URL_EXPIRE_SECONDS:3600}
